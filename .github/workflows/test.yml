name: Test

on:
  workflow_dispatch:
    inputs:
      os-variant:
        default: 'ubuntu-24.04'
        type: string
      python-version:
        type: string
      coverage-report:
        default: false
        type: boolean
      checkout_ref:
        default: ''
        type: string
  workflow_call:
    inputs:
      os-variant:
        default: 'ubuntu-24.04'
        type: string
      python-version:
        type: string
      coverage-report:
        default: false
        type: boolean
      checkout_ref:
        default: ''
        type: string

jobs:
  package-test:
    runs-on: ${{ inputs.os-variant }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref }}
      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          frozen: true
      - run: pixi run test -- tests/package_test.py
        name: Run package tests

  test:
    runs-on: ${{ inputs.os-variant }}
    env:
        ESS_PROTECTED_FILESTORE_USERNAME: ${{ secrets.ESS_PROTECTED_FILESTORE_USERNAME }}
        ESS_PROTECTED_FILESTORE_PASSWORD: ${{ secrets.ESS_PROTECTED_FILESTORE_PASSWORD }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref }}
      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          frozen: true
      - run: pixi run test
        name: Run all unit tests
      - uses: actions/upload-artifact@v7
        if: ${{ inputs.coverage-report }}
        with:
          name: CoverageReport
          path: coverage_html/
